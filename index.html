<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fuel Value Chain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f172a;
  --panel:rgba(255,255,255,.05);
  --panel-border:rgba(148,163,184,.2);
  --text-hi:#e2e8f0;
  --text-lo:#94a3b8;
  --upstream:#38bdf8;
  --intermediate:#a78bfa;
  --downstream:#fbbf24;
  --endcustomer:#34d399;
  --radius:16px;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  background:
    radial-gradient(circle at 18% -10%, rgba(56,189,248,.13), transparent 38%),
    radial-gradient(circle at 86% 6%, rgba(251,191,36,.11), transparent 28%),
    var(--bg);
  color:var(--text-hi);
  font-family:"Prompt",sans-serif;
}
a{color:inherit;text-decoration:none}
.page-header{text-align:center;padding:34px 20px 8px}
.eyebrow{font-size:12px;color:var(--text-lo);letter-spacing:2px;text-transform:uppercase}
.page-header h1{font-size:clamp(24px,4vw,42px);font-weight:700;margin:8px 0 8px}
.page-header p{margin:0;color:var(--text-lo);font-size:14px}
.chain-wrap{padding:26px 28px 58px;overflow-x:auto}
.flow-wrap{position:relative;min-width:1180px;max-width:1500px;margin:0 auto}
.section-title-row{display:grid;grid-template-columns:repeat(4,1fr);gap:28px;margin-bottom:14px}
.section-title{
  text-align:center;
  font-size:13px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  font-weight:600;
  padding:10px 0;
  border-radius:10px;
  border:1px solid var(--panel-border);
  background:rgba(255,255,255,.035);
}
.section-title.upstream{color:var(--upstream);box-shadow:inset 0 0 0 1px rgba(56,189,248,.22)}
.section-title.intermediate{color:var(--intermediate);box-shadow:inset 0 0 0 1px rgba(167,139,250,.22)}
.section-title.downstream{color:var(--downstream);box-shadow:inset 0 0 0 1px rgba(251,191,36,.22)}
.section-title.endcustomer{color:var(--endcustomer);box-shadow:inset 0 0 0 1px rgba(52,211,153,.22)}
.flow-grid{position:relative;display:grid;grid-template-columns:repeat(4,1fr);gap:64px;min-height:620px}
.stage-col{display:flex;flex-direction:column;justify-content:center;gap:20px;position:relative;z-index:2}
.group-label{
  font-size:11px;
  text-align:center;
  color:var(--text-lo);
  background:rgba(255,255,255,.04);
  border:1px solid var(--panel-border);
  border-radius:8px;
  padding:5px 0;
}
.group-divider{height:1px;background:linear-gradient(90deg,transparent,var(--panel-border),transparent)}
.node{
  background:linear-gradient(160deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
  border:1px solid var(--panel-border);
  border-radius:var(--radius);
  padding:15px 16px;
  position:relative;
  backdrop-filter:blur(8px);
  transition:transform .22s ease,box-shadow .22s ease,border-color .22s ease;
  opacity:0;
  transform:translateY(14px);
  animation:fadeInUp .55s ease forwards;
}
@keyframes fadeInUp{to{opacity:1;transform:translateY(0)}}
.node:hover,.node.link-node:focus-visible{
  transform:scale(1.04) translateY(-2px);
  box-shadow:0 18px 38px -15px var(--node-glow,rgba(56,189,248,.5));
  border-color:var(--node-color,var(--upstream));
}
.node.link-node{cursor:pointer}
.node-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.node-name{font-size:14px;font-weight:500;line-height:1.45}
.node-icon{
  width:34px;height:34px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex:0 0 auto;
  background:rgba(255,255,255,.06);
  border:1px solid var(--panel-border);
}
.node small{display:block;margin-top:8px;color:var(--text-lo);font-size:11px}
.node[data-stage=upstream]{--node-color:var(--upstream);--node-glow:rgba(56,189,248,.45)}
.node[data-stage=intermediate]{--node-color:var(--intermediate);--node-glow:rgba(167,139,250,.45)}
.node[data-stage=downstream]{--node-color:var(--downstream);--node-glow:rgba(251,191,36,.45)}
.node[data-stage=endcustomer]{--node-color:var(--endcustomer);--node-glow:rgba(52,211,153,.45)}
.flow-svg{position:absolute;inset:0;width:100%;height:100%;z-index:1;overflow:visible;pointer-events:none}
.flow-line{
  fill:none;
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-dasharray:10 8;
  animation:flowDash 6s linear infinite;
  opacity:.86;
}
@keyframes flowDash{to{stroke-dashoffset:-180}}
.flow-line-label{font-family:"Prompt",sans-serif;font-size:10px;fill:var(--text-hi)}
.flow-line-label-bg{fill:var(--bg);stroke:var(--panel-border);stroke-width:1px;opacity:.92}
.footer-note{margin-top:30px;color:var(--text-lo);text-align:center;font-size:12px}
@media(max-width:1024px){.chain-wrap{padding:20px 14px 50px}}
</style>
</head>
<body>
<header class="page-header">
  <div class="eyebrow">Oil Retail Intelligence</div>
  <h1>Fuel Value Chain</h1>
  <p>ห่วงโซ่อุปทานน้ำมันเชื้อเพลิง จากต้นน้ำสู่ผู้ใช้ปลายทาง</p>
</header>

<main class="chain-wrap">
  <section class="flow-wrap" aria-label="Fuel value chain">
    <div class="section-title-row">
      <div class="section-title upstream">Upstream</div>
      <div class="section-title intermediate">Intermediate</div>
      <div class="section-title downstream">Downstream</div>
      <div class="section-title endcustomer">End Customers</div>
    </div>

    <svg class="flow-svg" id="flow-svg">
      <defs>
        <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 Z" fill="#22d3ee"></path>
        </marker>
      </defs>
    </svg>

    <div class="flow-grid" id="flow-grid">
      <div class="stage-col" id="col-upstream"></div>
      <div class="stage-col" id="col-intermediate"></div>
      <div class="stage-col" id="col-downstream"></div>
      <div class="stage-col" id="col-endcustomer"></div>
    </div>
  </section>
  <p class="footer-note">คลิก “สถานีบริการน้ำมันเชื้อเพลิง” เพื่อดูบริษัทค้าปลีกน้ำมันหลักในประเทศไทย</p>
</main>

<script>
const STAGE_META = {
  upstream:{color:"#38bdf8"},
  intermediate:{color:"#a78bfa"},
  downstream:{color:"#fbbf24"},
  endcustomer:{color:"#34d399"}
};

const NODES = [
  {id:"U1",name:"แหล่งผลิตน้ำมันดิบในประเทศ",stage:"upstream",icon:"🛢️"},
  {id:"U2",name:"แหล่งผลิตบนบกและนอกชายฝั่ง",stage:"upstream",icon:"🏗️"},
  {id:"U3",name:"นำเข้าน้ำมันดิบ",stage:"upstream",icon:"🚢"},
  {id:"U4",name:"นำเข้าน้ำมันสำเร็จรูป",stage:"upstream",icon:"📦"},
  {id:"I1",name:"โรงกลั่นน้ำมัน",stage:"intermediate",icon:"🏭"},
  {id:"I2",name:"เอทานอลหรือไบโอดีเซลสำหรับผสม",stage:"intermediate",icon:"🧪"},
  {id:"D1",name:"คลังน้ำมันเชื้อเพลิง",stage:"downstream",icon:"🏬"},
  {id:"E1",name:"ส่งออกน้ำมันดิบ",stage:"endcustomer",icon:"🌍"},
  {id:"E2",name:"ส่งออกน้ำมันสำเร็จรูป",stage:"endcustomer",icon:"✈️"},
  {id:"E3",name:"สถานีบริการน้ำมันเชื้อเพลิง",stage:"endcustomer",icon:"⛽",href:"companies.html",note:"Retail network"},
  {id:"E4",name:"น้ำมันอากาศยาน",stage:"endcustomer",icon:"🛫"},
  {id:"E5",name:"โรงไฟฟ้าและโรงงานอุตสาหกรรม",stage:"endcustomer",icon:"⚡"},
  {id:"E6",name:"กิจกรรมอื่น ๆ",stage:"endcustomer",icon:"👥"}
];

const CONNECTIONS = [
  ["U1","E1","1·2"],["U1","I1","4"],["U2","I1","5·3·7"],["U3","I1","6"],
  ["U4","I1","8·9"],["U4","D1","8·10"],["I1","D1","12"],["I1","D1","11·13·16"],
  ["I1","I2","14"],["I2","D1","15"],["I1","E2","11·13·18"],["D1","E3","17·19"],
  ["D1","E4","17·20"],["D1","E5","17·21"],["D1","E6","17·22"]
];

const stageColEl = {
  upstream:document.getElementById("col-upstream"),
  intermediate:document.getElementById("col-intermediate"),
  downstream:document.getElementById("col-downstream"),
  endcustomer:document.getElementById("col-endcustomer")
};

NODES.forEach((node,index)=>{
  const tag = node.href ? "a" : "div";
  const el = document.createElement(tag);
  el.className = "node" + (node.href ? " link-node" : "");
  el.dataset.stage = node.stage;
  el.dataset.id = node.id;
  el.style.animationDelay = `${index * .045}s`;
  if(node.href) el.href = node.href;
  el.innerHTML = `
    <div class="node-top">
      <div>
        <div class="node-name">${node.name}</div>
        ${node.note ? `<small>${node.note}</small>` : ""}
      </div>
      <div class="node-icon">${node.icon}</div>
    </div>`;
  stageColEl[node.stage].appendChild(el);
});

function insertGroupLabel(beforeNodeId,text){
  const target = document.querySelector(`.node[data-id="${beforeNodeId}"]`);
  const label = document.createElement("div");
  label.className = "group-label";
  label.textContent = text;
  target.parentNode.insertBefore(label,target);
}
function insertDivider(beforeNodeId){
  const target = document.querySelector(`.node[data-id="${beforeNodeId}"]`);
  const divider = document.createElement("div");
  divider.className = "group-divider";
  target.parentNode.insertBefore(divider,target);
}
insertGroupLabel("U1","ผลิตในประเทศ");
insertDivider("U3");
insertGroupLabel("U3","นำเข้าต่างประเทศ");
insertGroupLabel("E1","ส่งออกต่างประเทศ");
insertDivider("E3");

const svg = document.getElementById("flow-svg");
const flowWrap = document.querySelector(".flow-wrap");

function drawConnections(){
  svg.querySelectorAll(".flow-line,.flow-line-label,.flow-line-label-bg").forEach(el=>el.remove());
  const wrapRect = flowWrap.getBoundingClientRect();
  svg.setAttribute("viewBox",`0 0 ${wrapRect.width} ${wrapRect.height}`);
  const outCount = {}, inCount = {};
  CONNECTIONS.forEach(([from,to])=>{
    outCount[from]=(outCount[from]||0)+1;
    inCount[to]=(inCount[to]||0)+1;
  });
  const outSeen = {}, inSeen = {};
  CONNECTIONS.forEach(([fromId,toId,label],i)=>{
    const fromEl = document.querySelector(`.node[data-id="${fromId}"]`);
    const toEl = document.querySelector(`.node[data-id="${toId}"]`);
    if(!fromEl || !toEl) return;
    const fr = fromEl.getBoundingClientRect();
    const tr = toEl.getBoundingClientRect();
    outSeen[fromId]=(outSeen[fromId]||0)+1;
    inSeen[toId]=(inSeen[toId]||0)+1;
    const fanY = (idx,total,h)=>{
      if(total<=1) return h/2;
      const margin = Math.min(h*.32,14);
      return margin + (h - margin*2) * ((idx-1)/(total-1));
    };
    const x1 = fr.right - wrapRect.left;
    const y1 = fr.top - wrapRect.top + fanY(outSeen[fromId],outCount[fromId],fr.height);
    const x2 = tr.left - wrapRect.left;
    const y2 = tr.top - wrapRect.top + fanY(inSeen[toId],inCount[toId],tr.height);
    const midX = x1 + (x2-x1)/2 + ((i%5)*16 - 32);
    const d = Math.abs(y1-y2)<1 ? `M ${x1} ${y1} L ${x2} ${y2}` : `M ${x1} ${y1} L ${midX} ${y1} L ${midX} ${y2} L ${x2} ${y2}`;
    const stage = NODES.find(n=>n.id===fromId).stage;
    const path = document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",d);
    path.setAttribute("class","flow-line");
    path.setAttribute("stroke",STAGE_META[stage].color);
    path.setAttribute("marker-end","url(#arrowHead)");
    svg.appendChild(path);
    if(label){
      const labelX = midX;
      const labelY = (y1+y2)/2;
      const width = 10 + label.length * 6.2;
      const bg = document.createElementNS("http://www.w3.org/2000/svg","rect");
      bg.setAttribute("x",labelX-width/2);
      bg.setAttribute("y",labelY-12);
      bg.setAttribute("width",width);
      bg.setAttribute("height",14);
      bg.setAttribute("rx",4);
      bg.setAttribute("class","flow-line-label-bg");
      svg.appendChild(bg);
      const text = document.createElementNS("http://www.w3.org/2000/svg","text");
      text.setAttribute("x",labelX);
      text.setAttribute("y",labelY-2);
      text.setAttribute("class","flow-line-label");
      text.setAttribute("text-anchor","middle");
      text.textContent = label;
      svg.appendChild(text);
    }
  });
}
window.addEventListener("load",drawConnections);
window.addEventListener("resize",()=>requestAnimationFrame(drawConnections));
setTimeout(drawConnections,100);
</script>
</body>
</html>
